<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>游玩 · CYou Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;800&family=Outfit:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css?v=20260409" />
    <link rel="stylesheet" href="css/play.css?v=20260409" />
  </head>
  <body class="play-body">
    <div id="play-page" class="play-page" aria-live="polite">
      <div
        class="wechat-tip"
        id="wechat-tip"
        role="dialog"
        aria-modal="true"
        aria-labelledby="wechat-tip-title"
        hidden
      >
        <div class="wechat-tip__card" role="document">
          <p class="wechat-tip__badge">微信内打开</p>
          <h2 class="wechat-tip__title" id="wechat-tip-title">需要在浏览器体验</h2>
          <p class="wechat-tip__desc">
            由于微信内置浏览器对摄像头/手势能力支持有限，可能会出现「授权后无响应」。
            建议点击右上角「…」→「在浏览器打开」再体验。
          </p>
          <ol class="wechat-tip__steps">
            <li>点右上角 <strong>…</strong></li>
            <li>选择 <strong>在浏览器打开</strong>（或 Safari / Chrome）</li>
            <li>回到页面后重新进入游戏</li>
          </ol>
          <div class="wechat-tip__actions">
            <button type="button" class="btn--play wechat-tip__copy" id="wechat-copy-link">
              复制链接
            </button>
            <button type="button" class="btn btn--ghost wechat-tip__close" id="wechat-close-tip">
              我知道了
            </button>
          </div>
          <p class="wechat-tip__fineprint" id="wechat-copy-status" aria-live="polite"></p>
        </div>
      </div>

      <header class="play-header">
        <a class="btn btn--ghost play-back" href="index.html">← 返回游戏库</a>
        <a class="logo play-header-logo" href="index.html"
          ><span class="logo-cyou">CYou</span>
          <span class="logo-games">Games</span></a
        >
        <div class="play-header-actions">
          <button
            type="button"
            class="btn btn--ghost play-info-toggle"
            id="play-info-toggle"
            aria-controls="play-sidebar"
            aria-expanded="false"
          >
            简介
          </button>
          <button type="button" class="btn btn--ghost" id="play-fullscreen">全屏</button>
        </div>
      </header>

      <div class="play-split">
        <section class="play-preview" aria-label="游戏体验区">
          <div class="play-frame-wrap" id="play-frame-wrap">
            <iframe
              class="play-frame"
              id="game-frame"
              title="游戏内容"
              src="about:blank"
              allow="camera *; microphone *; fullscreen; autoplay; display-capture; gamepad"
            ></iframe>
          </div>
          <p class="play-preview-hint" id="play-preview-hint" hidden>
            从游戏库选择作品后，将在此处加载真实游戏画面。
          </p>
        </section>

        <aside class="play-sidebar" id="play-sidebar">
          <button
            type="button"
            class="play-sheet-handle"
            id="play-sheet-handle"
            aria-label="展开/收起简介"
          >
            <span class="play-sheet-grip" aria-hidden="true"></span>
          </button>
          <div class="play-sidebar-inner">
            <p class="play-intro-badge" id="play-intro-badge"></p>
            <h1 class="play-intro-title" id="play-intro-title">加载中…</h1>
            <p class="play-intro-desc" id="play-intro-desc"></p>
            <ul class="play-intro-tags" id="play-intro-tags" hidden></ul>
            <ul class="play-intro-tips" id="play-intro-tips"></ul>
            <div class="play-intro-actions" id="play-intro-actions" hidden>
              <button type="button" class="btn--play" id="play-start-full">全屏体验</button>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <script src="js/games-data.js?v=20260409"></script>
    <script src="js/play.js?v=20260409"></script>
  </body>
</html>
