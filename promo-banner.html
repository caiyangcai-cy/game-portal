<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>CYou Games Promo</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 1200px;
      height: 630px;
      background: #09090b;
      overflow: hidden;
      font-family: 'Noto Sans SC', sans-serif;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px 100px;
      /* Remove scrollbars to ensure perfect screenshot */
      margin: 0;
    }
    /* Gradients matching the site */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 80% at 20% 30%, rgba(183, 110, 121, 0.25), transparent 60%),
        radial-gradient(ellipse 80% 80% at 80% 70%, rgba(92, 33, 41, 0.3), transparent 60%);
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 30px;
      max-width: 650px;
    }
    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 80px;
      font-weight: 800;
      letter-spacing: 2px;
      display: flex;
      gap: 15px;
    }
    .logo-cyou {
      color: #fff;
    }
    .logo-games {
      color: #b76e79;
    }
    .tagline {
      font-size: 40px;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 800;
      line-height: 1.5;
      margin-top: 10px;
    }
    .features {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }
    .feature-tag {
      padding: 12px 28px;
      border: 1px solid rgba(183, 110, 121, 0.4);
      border-radius: 40px;
      color: #b76e79;
      font-size: 22px;
      font-weight: 600;
      background: rgba(183, 110, 121, 0.05);
      backdrop-filter: blur(10px);
    }
    .website {
      margin-top: 40px;
      font-family: 'Outfit', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 16px;
      letter-spacing: 1px;
    }
    .website::before {
      content: "";
      display: block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #b76e79;
      box-shadow: 0 0 15px #b76e79, 0 0 30px rgba(183, 110, 121, 0.5);
    }
    .qr-section {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      background: rgba(255, 255, 255, 0.04);
      padding: 45px;
      border-radius: 36px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
    }
    .qr-image {
      width: 300px;
      height: 300px;
      border-radius: 16px;
      background: #fff;
      padding: 16px;
      box-shadow: 0 0 40px rgba(183, 110, 121, 0.25);
      object-fit: cover;
    }
    .qr-text {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 600;
      letter-spacing: 6px;
      text-align: center;
      margin-left: 6px; /* Offset for letter spacing to center visually */
    }
    
    /* Decorative elements */
    .star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 12px 3px rgba(255, 255, 255, 0.6);
    }
  </style>
</head>
<body>
  <div class="star" style="top: 15%; left: 8%;"></div>
  <div class="star" style="top: 30%; left: 45%; transform: scale(1.5);"></div>
  <div class="star" style="top: 85%; left: 35%;"></div>
  <div class="star" style="top: 12%; left: 85%;"></div>
  <div class="star" style="top: 75%; left: 92%; transform: scale(0.8);"></div>

  <div class="content">
    <div class="logo">
      <span class="logo-cyou">CYou</span><span class="logo-games">Games</span>
    </div>
    <div class="tagline">
      探寻卡牌的奥秘<br/>遇见未知的自己
    </div>
    <div class="features">
      <div class="feature-tag">小樱魔法卡</div>
      <div class="feature-tag">塔罗牌占卜</div>
    </div>
    <div class="website">
      cyougames.site
    </div>
  </div>

  <div class="qr-section">
    <img src="qrcode.png" alt="QR Code" class="qr-image" />
    <div class="qr-text">扫码即刻体验</div>
  </div>
</body>
</html>
