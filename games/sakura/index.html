<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小樱 · 占位演示</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        background: linear-gradient(180deg, #ffe8f0 0%, #ffc4d6 40%, #ff9ebb 100%);
        color: #5c1a3a;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      .ui {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 0.75rem 1rem 1rem;
        background: linear-gradient(transparent, rgba(255, 255, 255, 0.92));
        font-size: 0.85rem;
        line-height: 1.5;
        text-align: center;
      }
      .ui strong {
        display: block;
        margin-bottom: 0.25rem;
      }
      code {
        font-size: 0.78em;
        background: rgba(255, 255, 255, 0.65);
        padding: 0.1rem 0.35rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <canvas id="c" width="800" height="600" aria-label="樱花飘落演示"></canvas>
    <div class="ui">
      <strong>小樱 · 占位演示</strong>
      拖拽或滑动画面收集花瓣。正式游戏请覆盖 <code>games/sakura/</code> 下的文件。
    </div>
    <script>
      (function () {
        var canvas = document.getElementById("c");
        var ctx = canvas.getContext("2d");
        var dpr = Math.min(window.devicePixelRatio || 1, 2);

        function resize() {
          var w = window.innerWidth;
          var h = window.innerHeight;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener("resize", resize);

        var petals = [];
        var w0 = window.innerWidth;
        var h0 = window.innerHeight;
        for (var i = 0; i < 48; i++) {
          petals.push({
            x: Math.random() * w0,
            y: Math.random() * h0,
            r: 6 + Math.random() * 10,
            vx: -0.4 + Math.random() * 0.8,
            vy: 0.6 + Math.random() * 1.2,
            rot: Math.random() * Math.PI * 2,
            vr: -0.03 + Math.random() * 0.06,
            collected: false,
          });
        }

        var pointer = { x: 0, y: 0, active: false };

        function onMove(e) {
          var p = e.touches ? e.touches[0] : e;
          pointer.x = p.clientX;
          pointer.y = p.clientY;
        }
        window.addEventListener("mousemove", onMove);
        window.addEventListener(
          "touchmove",
          function (e) {
            onMove(e);
            e.preventDefault();
          },
          { passive: false }
        );
        window.addEventListener("mousedown", function () {
          pointer.active = true;
        });
        window.addEventListener("mouseup", function () {
          pointer.active = false;
        });
        window.addEventListener("touchstart", function (e) {
          pointer.active = true;
          onMove(e);
        });
        window.addEventListener("touchend", function () {
          pointer.active = false;
        });

        function tick() {
          var w = window.innerWidth;
          var h = window.innerHeight;
          ctx.clearRect(0, 0, w, h);

          petals.forEach(function (p) {
            if (p.collected) return;
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vr;
            if (p.y > h + 20) {
              p.y = -20;
              p.x = Math.random() * w;
            }
            if (pointer.active) {
              var dx = p.x - pointer.x;
              var dy = p.y - pointer.y;
              if (dx * dx + dy * dy < (p.r + 40) * (p.r + 40)) {
                p.collected = true;
              }
            }
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
            ctx.beginPath();
            ctx.ellipse(0, 0, p.r, p.r * 0.55, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "rgba(255, 182, 210, 0.95)";
            ctx.beginPath();
            ctx.ellipse(0, 0, p.r * 0.45, p.r * 0.28, 0.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          });

          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
